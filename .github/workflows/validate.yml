name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r infrastructure/requirements.txt
          npm install --global aws-cdk

      - name: Lint
        run: ruff check backend tests infrastructure scripts

      - name: Scan repository for common secret patterns
        run: python scripts/check_repository_secrets.py

      - name: Validate load-test CLI
        run: python scripts/run_load_test.py --help

      - name: Validate AWS metric collector CLI
        run: python scripts/collect_aws_performance_evidence.py --help

      - name: Test pagination contract
        env:
          PYTHONPATH: backend:.
          AWS_DEFAULT_REGION: eu-west-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest -q tests/test_pagination.py

      - name: Test load-report calculations
        env:
          PYTHONPATH: backend:.
          AWS_DEFAULT_REGION: eu-west-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest -q tests/test_load_test_report.py

      - name: Test application
        env:
          PYTHONPATH: backend:.
          AWS_DEFAULT_REGION: eu-west-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest -q tests

      - name: Test infrastructure
        working-directory: infrastructure
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests

      - name: Synthesize CloudFormation
        working-directory: infrastructure
        run: cdk synth --quiet

      - name: Validate Lambda native dependency architecture
        run: |
          python scripts/check_lambda_bundle_architecture.py             infrastructure/cdk.out

      - name: Enforce cost guardrails
        run: python scripts/check_zero_cost.py infrastructure/cdk.out/CloudOpsIncidentHubStack.template.json

      - name: Enforce OIDC deployment guardrails
        run: python scripts/check_oidc_workflows.py

      - name: Enforce Well-Architected review guardrails
        run: python scripts/check_well_architected_review.py

      - name: Enforce multi-account blueprint guardrails
        run: python scripts/check_multi_account_blueprint.py

      - name: Enforce P0 production controls
        run: python scripts/check_p0_controls.py

      - name: Enforce P1 reliability and operations controls
        run: python scripts/check_p1_controls.py

      - name: Enforce ChatOps architecture guardrails
        run: python scripts/check_chatops_controls.py

      - name: Enforce operational security and supply-chain controls
        run: python scripts/check_security_supply_chain.py

      - name: Enforce pagination and load-testing controls
        run: python scripts/check_pagination_load_testing.py

      - name: Enforce controlled AWS performance workflow
        run: python scripts/check_aws_performance_workflow.py
