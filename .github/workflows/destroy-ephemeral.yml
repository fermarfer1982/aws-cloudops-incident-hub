name: Destroy ephemeral AWS lab
run-name: Emergency cleanup by ${{ github.actor }} (#${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DESTROY-EPHEMERAL-STACK to continue
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-ephemeral-${{ github.repository }}
  cancel-in-progress: false

jobs:
  destroy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: aws-ephemeral
    timeout-minutes: 15
    env:
      STACK_NAME: CloudOpsIncidentHubStack
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Validate explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$CONFIRMATION" = "DESTROY-EPHEMERAL-STACK" || {
            echo "Confirmation must be exactly DESTROY-EPHEMERAL-STACK"
            exit 1
          }

      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/requirements.txt
          npm install --global aws-cdk@2

      - name: Configure temporary AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: GitHubCleanup-${{ github.run_id }}
          role-duration-seconds: 900
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Destroy stack if present
        working-directory: infrastructure
        run: |
          if ! aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Stack does not exist; nothing to destroy"
            exit 0
          fi

          cdk destroy "$STACK_NAME" --force \
            -c account="$AWS_ACCOUNT_ID" \
            -c region="$AWS_REGION"

      - name: Verify stack removal
        run: |
          if aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Stack still exists after cleanup"
            exit 1
          fi
          echo "Stack removal verified"
