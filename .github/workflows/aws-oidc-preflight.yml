name: AWS OIDC preflight

run-name: AWS OIDC preflight by ${{ github.actor }} (#${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type CHECK-OIDC-ONLY to continue
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  verify-oidc:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: aws-ephemeral
    timeout-minutes: 5

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Validate confirmation and variables
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          test "$CONFIRMATION" = "CHECK-OIDC-ONLY"
          test -n "$AWS_REGION"
          test -n "$AWS_ACCOUNT_ID"
          test -n "$AWS_DEPLOY_ROLE_ARN"

      - name: Configure temporary AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: GitHubOIDCPreflight-${{ github.run_id }}
          role-duration-seconds: 900
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify assumed identity
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ARN=$(aws sts get-caller-identity --query Arn --output text)

          echo "Account verified: $ACCOUNT"
          echo "Assumed identity: $ARN"

          test "$ACCOUNT" = "$AWS_ACCOUNT_ID"

          case "$ARN" in
            arn:aws:sts::${AWS_ACCOUNT_ID}:assumed-role/cloudops-github-oidc-deploy/*)
              echo "OIDC role verified"
              ;;
            *)
              echo "Unexpected AWS identity"
              exit 1
              ;;
          esac

      - name: Verify CDK bootstrap
        run: |
          BOOTSTRAP_VERSION=$(aws ssm get-parameter \
            --name /cdk-bootstrap/hnb659fds/version \
            --region "$AWS_REGION" \
            --query Parameter.Value \
            --output text)

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name CDKToolkit \
            --region "$AWS_REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text)

          echo "CDK bootstrap version: $BOOTSTRAP_VERSION"
          echo "CDKToolkit status: $STACK_STATUS"

          test "$BOOTSTRAP_VERSION" = "32"
          test "$STACK_STATUS" = "CREATE_COMPLETE"
