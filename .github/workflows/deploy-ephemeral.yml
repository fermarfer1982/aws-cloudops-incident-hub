name: Deploy ephemeral AWS lab
run-name: Ephemeral AWS lab by ${{ github.actor }} (#${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-AND-DESTROY to continue
        required: true
        type: string
      run_smoke_test:
        description: Run authorization and asynchronous processing smoke tests
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-ephemeral-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy-test-destroy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: aws-ephemeral
    timeout-minutes: 30
    env:
      STACK_NAME: CloudOpsIncidentHubStack
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Validate explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$CONFIRMATION" = "DEPLOY-AND-DESTROY" || {
            echo "Confirmation must be exactly DEPLOY-AND-DESTROY"
            exit 1
          }

      - name: Validate required repository variables
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ACCOUNT_ID"
          test -n "$AWS_DEPLOY_ROLE_ARN"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r infrastructure/requirements.txt
          npm install --global aws-cdk@2

      - name: Configure temporary AWS credentials through OIDC
        id: aws_credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: GitHubActions-${{ github.run_id }}
          role-duration-seconds: 1800
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Validate and synthesize infrastructure
        working-directory: infrastructure
        run: |
          python -m pytest -q tests
          cdk synth "$STACK_NAME" --quiet \
            -c account="$AWS_ACCOUNT_ID" \
            -c region="$AWS_REGION"
          python ../scripts/check_lambda_bundle_architecture.py cdk.out
          python ../scripts/check_zero_cost.py \
            "cdk.out/${STACK_NAME}.template.json"
          python ../scripts/check_p0_controls.py

      - name: Deploy ephemeral stack
        working-directory: infrastructure
        run: |
          mkdir -p ../evidence
          cdk deploy "$STACK_NAME" \
            --require-approval never \
            --outputs-file ../evidence/cdk-outputs.json \
            -c account="$AWS_ACCOUNT_ID" \
            -c region="$AWS_REGION"

      - name: Load deployment outputs
        if: inputs.run_smoke_test
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          with open("evidence/cdk-outputs.json", encoding="utf-8") as handle:
              outputs = json.load(handle)["CloudOpsIncidentHubStack"]
          print(f"API_URL={outputs['ApiUrl'].rstrip('/')}")
          print(f"TABLE_NAME={outputs['TableName']}")
          print(f"EVENT_BUS_NAME={outputs['EventBusName']}")
          PY

      - name: Verify public health and protected API boundary
        if: inputs.run_smoke_test
        run: |
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            "$API_URL/health" | tee evidence/health.json

          anonymous_status=$(curl --silent --show-error \
            --output evidence/anonymous-events.json \
            --write-out '%{http_code}' \
            "$API_URL/events?limit=1")
          echo "$anonymous_status" > evidence/anonymous-events-status.txt
          test "$anonymous_status" = "401" || test "$anonymous_status" = "403" || {
            echo "Protected route unexpectedly returned HTTP $anonymous_status"
            exit 1
          }

      - name: Exercise EventBridge to DynamoDB processing
        if: inputs.run_smoke_test
        run: |
          EXPECTED_INCIDENT_ID=$(python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          run_id = os.environ["GITHUB_RUN_ID"]
          event_id = hashlib.sha256(
              f"{run_id}:{os.environ['GITHUB_SHA']}".encode()
          ).hexdigest()
          timestamp = datetime.now(timezone.utc).replace(microsecond=0)
          incident_id = f"INC-{timestamp:%Y%m%d}-{event_id[:8].upper()}"
          detail = {
              "event_id": event_id,
              "event": {
                  "source": f"github-actions-{run_id}",
                  "site": "ephemeral-lab",
                  "type": "GITHUB_OIDC_SMOKE_TEST",
                  "message": "Protected P0 deployment smoke test from GitHub Actions",
                  "metadata": {
                      "github_run_id": run_id,
                      "github_sha": os.environ["GITHUB_SHA"],
                  },
                  "timestamp": timestamp.isoformat(),
              },
          }
          entry = [{
              "EventBusName": os.environ["EVENT_BUS_NAME"],
              "Source": "cloudops.incident-hub",
              "DetailType": "InfrastructureIncidentReceived",
              "Detail": json.dumps(detail, separators=(",", ":")),
          }]
          with open("evidence/eventbridge-entry.json", "w", encoding="utf-8") as handle:
              json.dump(entry, handle, indent=2)
          print(incident_id)
          PY
          )
          export EXPECTED_INCIDENT_ID
          echo "EXPECTED_INCIDENT_ID=$EXPECTED_INCIDENT_ID" >> "$GITHUB_ENV"

          aws events put-events \
            --entries file://evidence/eventbridge-entry.json \
            | tee evidence/put-events-result.json

          python - <<'PY'
          import json
          with open("evidence/put-events-result.json", encoding="utf-8") as handle:
              result = json.load(handle)
          raise SystemExit(0 if result.get("FailedEntryCount") == 0 else 1)
          PY

          processed=false
          for attempt in $(seq 1 24); do
            aws dynamodb get-item \
              --table-name "$TABLE_NAME" \
              --key "{\"incident_id\":{\"S\":\"$EXPECTED_INCIDENT_ID\"}}" \
              --consistent-read > evidence/dynamodb-item.json
            if python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = Path("evidence/dynamodb-item.json").read_text(
              encoding="utf-8"
          ).strip()

          if not raw:
              raise SystemExit(1)

          item = json.loads(raw).get("Item", {})
          valid = (
              item.get("incident_id", {}).get("S") == os.environ["EXPECTED_INCIDENT_ID"]
              and item.get("type", {}).get("S") == "GITHUB_OIDC_SMOKE_TEST"
          )
          raise SystemExit(0 if valid else 1)
          PY
            then
              processed=true
              break
            fi
            sleep 5
          done

          test "$processed" = true || {
            echo "The asynchronous incident was not observable before the timeout"
            exit 1
          }

      - name: Collect asynchronous processor diagnostics
        if: always() && steps.aws_credentials.outcome == 'success' && inputs.run_smoke_test
        continue-on-error: true
        run: |
          set +e

          mkdir -p evidence/diagnostics

          aws cloudformation list-stack-resources \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            > evidence/diagnostics/stack-resources.json 2> \
              evidence/diagnostics/stack-resources-error.txt

          python - <<'PY' > evidence/diagnostics/resources.env
          import json
          import shlex
          from pathlib import Path

          path = Path("evidence/diagnostics/stack-resources.json")

          if not path.exists() or not path.read_text(encoding="utf-8").strip():
              print("PROCESSOR_FUNCTION_NAME=''")
              print("PROCESSOR_LOG_GROUP_NAME=''")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))
          resources = data.get("StackResourceSummaries", [])

          def physical_id(logical_prefix: str, resource_type: str) -> str:
              for resource in resources:
                  logical_id = resource.get("LogicalResourceId", "")
                  if (
                      resource.get("ResourceType") == resource_type
                      and logical_id.startswith(logical_prefix)
                  ):
                      return resource.get("PhysicalResourceId", "")
              return ""

          function_name = physical_id(
              "ProcessorFunction",
              "AWS::Lambda::Function",
          )
          log_group_name = physical_id(
              "ProcessorFunctionLogGroup",
              "AWS::Logs::LogGroup",
          )

          print(
              "PROCESSOR_FUNCTION_NAME="
              + shlex.quote(function_name)
          )
          print(
              "PROCESSOR_LOG_GROUP_NAME="
              + shlex.quote(log_group_name)
          )
          PY

          source evidence/diagnostics/resources.env

          {
            echo "PROCESSOR_FUNCTION_NAME=$PROCESSOR_FUNCTION_NAME"
            echo "PROCESSOR_LOG_GROUP_NAME=$PROCESSOR_LOG_GROUP_NAME"
          } > evidence/diagnostics/resolved-resources.txt

          if [ -n "$PROCESSOR_FUNCTION_NAME" ]; then
            aws lambda get-function-configuration \
              --function-name "$PROCESSOR_FUNCTION_NAME" \
              --region "$AWS_REGION" \
              > evidence/diagnostics/processor-function.json 2> \
                evidence/diagnostics/processor-function-error.txt

            aws lambda list-event-source-mappings \
              --function-name "$PROCESSOR_FUNCTION_NAME" \
              --region "$AWS_REGION" \
              > evidence/diagnostics/event-source-mappings.json 2> \
                evidence/diagnostics/event-source-mappings-error.txt
          fi

          if [ -n "$PROCESSOR_LOG_GROUP_NAME" ]; then
            START_MS=$(( ($(date +%s) - 1800) * 1000 ))

            aws logs filter-log-events \
              --log-group-name "$PROCESSOR_LOG_GROUP_NAME" \
              --start-time "$START_MS" \
              --region "$AWS_REGION" \
              > evidence/diagnostics/processor-log-events.json 2> \
                evidence/diagnostics/processor-log-events-error.txt
          fi

          PROCESSING_QUEUE_URL=$(aws sqs get-queue-url \
            --queue-name cloudops-incident-processing \
            --region "$AWS_REGION" \
            --query QueueUrl \
            --output text 2> evidence/diagnostics/queue-url-error.txt)

          PROCESSING_DLQ_URL=$(aws sqs get-queue-url \
            --queue-name cloudops-incident-processing-dlq \
            --region "$AWS_REGION" \
            --query QueueUrl \
            --output text 2> evidence/diagnostics/dlq-url-error.txt)

          {
            echo "PROCESSING_QUEUE_URL=$PROCESSING_QUEUE_URL"
            echo "PROCESSING_DLQ_URL=$PROCESSING_DLQ_URL"
          } > evidence/diagnostics/queue-urls.txt

          if [ -n "$PROCESSING_QUEUE_URL" ] \
            && [ "$PROCESSING_QUEUE_URL" != "None" ]; then
            aws sqs get-queue-attributes \
              --queue-url "$PROCESSING_QUEUE_URL" \
              --attribute-names All \
              --region "$AWS_REGION" \
              > evidence/diagnostics/processing-queue-attributes.json 2> \
                evidence/diagnostics/processing-queue-error.txt
          fi

          if [ -n "$PROCESSING_DLQ_URL" ] \
            && [ "$PROCESSING_DLQ_URL" != "None" ]; then
            aws sqs get-queue-attributes \
              --queue-url "$PROCESSING_DLQ_URL" \
              --attribute-names All \
              --region "$AWS_REGION" \
              > evidence/diagnostics/dlq-attributes.json 2> \
                evidence/diagnostics/dlq-attributes-error.txt

            aws sqs receive-message \
              --queue-url "$PROCESSING_DLQ_URL" \
              --max-number-of-messages 10 \
              --visibility-timeout 0 \
              --wait-time-seconds 0 \
              --region "$AWS_REGION" \
              > evidence/diagnostics/dlq-messages.json 2> \
                evidence/diagnostics/dlq-messages-error.txt
          fi

      - name: Record deployment metadata
        if: always() && steps.aws_credentials.outcome == 'success'
        run: |
          mkdir -p evidence
          {
            echo "repository=${GITHUB_REPOSITORY}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "commit=${GITHUB_SHA}"
            echo "region=${AWS_REGION}"
            echo "stack=${STACK_NAME}"
            date -u +"captured_at=%Y-%m-%dT%H:%M:%SZ"
          } > evidence/deployment-metadata.txt

      - name: Upload temporary deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-ephemeral-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: warn
          retention-days: 7

      - name: Destroy ephemeral stack
        if: always() && steps.aws_credentials.outcome == 'success'
        working-directory: infrastructure
        run: |
          cdk destroy "$STACK_NAME" --force \
            -c account="$AWS_ACCOUNT_ID" \
            -c region="$AWS_REGION"

      - name: Verify stack removal
        if: always() && steps.aws_credentials.outcome == 'success'
        run: |
          if aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Stack still exists after the cleanup step"
            exit 1
          fi
          echo "Stack removal verified"
