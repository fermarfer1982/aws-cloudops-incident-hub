name: Deploy ephemeral AWS lab
run-name: Ephemeral AWS lab by ${{ github.actor }} (#${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      validation_profile:
        description: Select the mutually exclusive validation profile
        required: true
        default: genai-shell
        type: choice
        options:
          - genai-shell
          - legacy
      confirmation:
        description: Type the exact confirmation required by the selected profile
        required: true
        type: string
      run_smoke_test:
        description: Run authorization and asynchronous processing smoke tests
        required: true
        default: false
        type: boolean
      run_chatops_test:
        description: Route controlled ALARM and OK transitions to Slack
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-ephemeral-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy-test-destroy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Administrators must configure required reviewers on this Environment before execution.
    environment: aws-ephemeral
    timeout-minutes: 30
    env:
      STACK_NAME: CloudOpsIncidentHubStack
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
      RUN_CHATOPS_TEST: ${{ inputs.run_chatops_test }}
      SLACK_WORKSPACE_ID: ${{ secrets.SLACK_WORKSPACE_ID }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

    steps:
      - name: Validate profile and explicit confirmation
        id: preflight
        env:
          VALIDATION_PROFILE: ${{ inputs.validation_profile }}
          CONFIRMATION: ${{ inputs.confirmation }}
          RUN_SMOKE_TEST: ${{ inputs.run_smoke_test }}
          RUN_CHATOPS_TEST: ${{ inputs.run_chatops_test }}
        run: |
          set -euo pipefail
          case "$VALIDATION_PROFILE" in
            genai-shell)
              test "$CONFIRMATION" = "VALIDATE-GENAI-SHELL-AND-DESTROY"
              test "$RUN_SMOKE_TEST" = "false"
              test "$RUN_CHATOPS_TEST" = "false"
              ;;
            legacy)
              test "$CONFIRMATION" = "DEPLOY-AND-DESTROY"
              if [ "$RUN_SMOKE_TEST" != "true" ] \
                && [ "$RUN_CHATOPS_TEST" != "true" ]; then
                exit 1
              fi
              ;;
            *)
              exit 1
              ;;
          esac
          printf 'profile=%s\n' "$VALIDATION_PROFILE" >> "$GITHUB_OUTPUT"

      - name: Validate required repository variables
        if: steps.preflight.outcome == 'success'
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ACCOUNT_ID"
          test -n "$AWS_DEPLOY_ROLE_ARN"
          if [ "$RUN_CHATOPS_TEST" = "true" ]; then
            test -n "$SLACK_WORKSPACE_ID"
            test -n "$SLACK_CHANNEL_ID"
          fi

      - uses: actions/checkout@v4
        if: steps.preflight.outcome == 'success'

      - uses: actions/setup-python@v5
        if: steps.preflight.outcome == 'success'
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        if: steps.preflight.outcome == 'success'
        with:
          node-version: "22"

      - name: Install deployment dependencies
        if: steps.preflight.outcome == 'success'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r infrastructure/requirements.txt
          npm install --global aws-cdk@2

      - name: Configure temporary AWS credentials through OIDC
        id: aws_credentials
        if: steps.preflight.outcome == 'success'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          role-session-name: GitHubActions-${{ github.run_id }}
          role-duration-seconds: 1800
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS identity
        if: steps.preflight.outcome == 'success' && steps.aws_credentials.outcome == 'success'
        run: |
          aws sts get-caller-identity > /tmp/aws-identity.json
          test -s /tmp/aws-identity.json
          rm -f /tmp/aws-identity.json

      - name: Validate and synthesize infrastructure
        id: synth
        if: steps.preflight.outcome == 'success'
        working-directory: infrastructure
        run: |
          python -m pytest -q tests

          synth_context=(
            -c account="$AWS_ACCOUNT_ID"
            -c region="$AWS_REGION"
          )
          if [ "${{ steps.preflight.outputs.profile }}" = "genai-shell" ]; then
            synth_context+=(-c enable_load_test_client=true)
          fi

          cdk synth "$STACK_NAME" --quiet "${synth_context[@]}"
          python ../scripts/check_lambda_bundle_architecture.py cdk.out
          python ../scripts/check_zero_cost.py \
            "cdk.out/${STACK_NAME}.template.json"
          python ../scripts/check_p0_controls.py
          if [ "${{ steps.preflight.outputs.profile }}" = "genai-shell" ]; then
            python ../scripts/validate_genai_shell_aws.py template \
              --template "cdk.out/${STACK_NAME}.template.json"
          fi

          if [ "$RUN_CHATOPS_TEST" = "true" ]; then
            rm -rf cdk.out
            chatops_context=(
              -c account="$AWS_ACCOUNT_ID"
              -c region="$AWS_REGION"
              -c slack_workspace_id="$SLACK_WORKSPACE_ID"
              -c slack_channel_id="$SLACK_CHANNEL_ID"
            )
            cdk synth "$STACK_NAME" --quiet "${chatops_context[@]}"
            python ../scripts/check_chatops_controls.py
          fi

      - name: Deploy ephemeral stack
        id: deploy
        if: steps.preflight.outcome == 'success' && steps.synth.outcome == 'success'
        working-directory: infrastructure
        run: |
          mkdir -p ../evidence

          deploy_context=(
            -c account="$AWS_ACCOUNT_ID"
            -c region="$AWS_REGION"
          )
          outputs_file="../evidence/cdk-outputs.json"
          if [ "${{ steps.preflight.outputs.profile }}" = "genai-shell" ]; then
            deploy_context+=(-c enable_load_test_client=true)
            outputs_file="/tmp/genai-cdk-outputs.json"
          fi

          if [ "$RUN_CHATOPS_TEST" = "true" ]; then
            deploy_context+=(
              -c slack_workspace_id="$SLACK_WORKSPACE_ID"
              -c slack_channel_id="$SLACK_CHANNEL_ID"
            )
          fi

          cdk deploy "$STACK_NAME" \
            --require-approval never \
            --outputs-file "$outputs_file" \
            "${deploy_context[@]}"

      - name: Validate deployed GenAI shell IAM and resources
        id: iam
        if: steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'genai-shell' && steps.deploy.outcome == 'success'
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/genai-deployed-template-response.json /tmp/genai-deployed-template.json' EXIT
          aws cloudformation get-template \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" > /tmp/genai-deployed-template-response.json
          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(
              Path("/tmp/genai-deployed-template-response.json").read_text(encoding="utf-8")
          )
          body = response.get("TemplateBody")
          if isinstance(body, str):
              body = json.loads(body)
          if not isinstance(body, dict):
              raise SystemExit("Deployed template body is unavailable")
          Path("/tmp/genai-deployed-template.json").write_text(
              json.dumps(body, separators=(",", ":")),
              encoding="utf-8",
          )
          PY
          python scripts/validate_genai_shell_aws.py template \
            --template /tmp/genai-deployed-template.json

      - name: Exercise authorized and closed GenAI shell
        id: genai_smoke
        if: steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'genai-shell' && steps.deploy.outcome == 'success' && steps.iam.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          cleanup_temporaries() {
            rm -f /tmp/genai-oauth-curl.conf /tmp/genai-* \
              /tmp/cloudops-*-token.json /tmp/client-secret.txt
          }
          trap cleanup_temporaries EXIT

          python - <<'PY' > /tmp/genai-outputs.env
          import json
          import shlex
          from pathlib import Path

          outputs = json.loads(
              Path("/tmp/genai-cdk-outputs.json").read_text(encoding="utf-8")
          )["CloudOpsIncidentHubStack"]
          required = ("ApiUrl", "UserPoolId", "LoadTestClientId", "LoadTestTokenUrl")
          for name in required:
              value = str(outputs[name]).rstrip("/")
              print(f"{name.upper()}={shlex.quote(value)}")
          PY
          source /tmp/genai-outputs.env

          aws cognito-idp describe-user-pool-client \
            --user-pool-id "$USERPOOLID" \
            --client-id "$LOADTESTCLIENTID" \
            --query 'UserPoolClient.ClientSecret' \
            --output text > /tmp/client-secret.txt
          CLIENT_SECRET=$(< /tmp/client-secret.txt)
          test -n "$CLIENT_SECRET"
          test "$CLIENT_SECRET" != "None"
          echo "::add-mask::$CLIENT_SECRET"

          OAUTH_CURL_CONFIG=/tmp/genai-oauth-curl.conf
          umask 077
          printf 'user = "%s:%s"\n' \
            "$LOADTESTCLIENTID" "$CLIENT_SECRET" > "$OAUTH_CURL_CONFIG"
          chmod 600 /tmp/genai-oauth-curl.conf

          FULL_SCOPES="cloudops-incident-hub/incidents.read cloudops-incident-hub/incidents.write cloudops-incident-hub/incidents.summarize"
          PARTIAL_SCOPES="cloudops-incident-hub/incidents.read cloudops-incident-hub/incidents.write"
          curl --silent --show-error --connect-timeout 5 --max-time 15 \
            --config /tmp/genai-oauth-curl.conf \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "scope=$FULL_SCOPES" \
            "$LOADTESTTOKENURL" > /tmp/cloudops-full-token.json
          curl --silent --show-error --connect-timeout 5 --max-time 15 \
            --config /tmp/genai-oauth-curl.conf \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "scope=$PARTIAL_SCOPES" \
            "$LOADTESTTOKENURL" > /tmp/cloudops-partial-token.json
          FULL_TOKEN=$(python -c 'import json; print(json.load(open("/tmp/cloudops-full-token.json"))["access_token"])')
          PARTIAL_TOKEN=$(python -c 'import json; print(json.load(open("/tmp/cloudops-partial-token.json"))["access_token"])')
          test -n "$FULL_TOKEN"
          test -n "$PARTIAL_TOKEN"
          echo "::add-mask::$FULL_TOKEN"
          echo "::add-mask::$PARTIAL_TOKEN"

          printf '%s' '{"source":"synthetic-validation","site":"ephemeral-lab","type":"GENAI_SHELL_VALIDATION","message":"Synthetic incident for disabled GenAI shell validation","value":1,"metadata":{"synthetic":true}}' > /tmp/genai-event.json
          CREATE_STATUS=$(curl --silent --show-error --connect-timeout 5 --max-time 20 \
            --output /tmp/genai-create-response.json --write-out '%{http_code}' \
            --request POST --header "Authorization: Bearer $FULL_TOKEN" \
            --header "Content-Type: application/json" --data-binary @/tmp/genai-event.json \
            "$APIURL/events")
          test "$CREATE_STATUS" = "202"
          INCIDENT_ID=$(python -c 'import json; print(json.load(open("/tmp/genai-create-response.json"))["incident_id"])')
          test -n "$INCIDENT_ID"
          echo "::add-mask::$INCIDENT_ID"

          observed=false
          for _ in $(seq 1 24); do
            READ_STATUS=$(curl --silent --show-error --connect-timeout 5 --max-time 20 \
              --output /tmp/genai-incidents.json --write-out '%{http_code}' \
              --header "Authorization: Bearer $FULL_TOKEN" "$APIURL/events?limit=100")
            if [ "$READ_STATUS" = "200" ] && INCIDENT_ID="$INCIDENT_ID" python - <<'PY'
          import json
          import os

          with open("/tmp/genai-incidents.json", encoding="utf-8") as handle:
              incidents = json.load(handle)
          raise SystemExit(
              0 if any(item.get("incident_id") == os.environ["INCIDENT_ID"] for item in incidents) else 1
          )
          PY
            then
              observed=true
              break
            fi
            sleep 5
          done
          test "$observed" = true
          echo "Synthetic incident observed: true"

          printf '%s' '{"summary_type":"technical"}' > /tmp/genai-summary-request.json
          AUTHENTICATED_STATUS=$(curl --silent --show-error --connect-timeout 5 --max-time 20 \
            --dump-header /tmp/genai-authenticated-headers.txt \
            --output /tmp/genai-authenticated-body.json --write-out '%{http_code}' \
            --request POST --header "Authorization: Bearer $FULL_TOKEN" \
            --header "Content-Type: application/json" \
            --data-binary @/tmp/genai-summary-request.json \
            "$APIURL/incidents/$INCIDENT_ID/ai-summary")
          UNAUTHENTICATED_STATUS=$(curl --silent --show-error --connect-timeout 5 --max-time 20 \
            --output /tmp/genai-unauthenticated-body.txt --write-out '%{http_code}' \
            --request POST --header "Content-Type: application/json" \
            --data-binary @/tmp/genai-summary-request.json \
            "$APIURL/incidents/$INCIDENT_ID/ai-summary")
          WRONG_SCOPE_STATUS=$(curl --silent --show-error --connect-timeout 5 --max-time 20 \
            --output /tmp/genai-wrong-scope-body.txt --write-out '%{http_code}' \
            --request POST --header "Authorization: Bearer $PARTIAL_TOKEN" \
            --header "Content-Type: application/json" \
            --data-binary @/tmp/genai-summary-request.json \
            "$APIURL/incidents/$INCIDENT_ID/ai-summary")
          python scripts/validate_genai_shell_aws.py responses \
            --authenticated-status "$AUTHENTICATED_STATUS" \
            --authenticated-headers /tmp/genai-authenticated-headers.txt \
            --authenticated-body /tmp/genai-authenticated-body.json \
            --unauthenticated-status "$UNAUTHENTICATED_STATUS" \
            --wrong-scope-status "$WRONG_SCOPE_STATUS"

          aws cloudwatch get-metric-data --region "$AWS_REGION" \
            --start-time "$(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ)" \
            --end-time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --metric-data-queries '[{"Id":"incoming","MetricStat":{"Metric":{"Namespace":"AWS/Logs","MetricName":"IncomingLogEvents","Dimensions":[{"Name":"LogGroupName","Value":"/aws/lambda/cloudops-genai-summary-function"}]},"Period":60,"Stat":"Sum"},"ReturnData":true}]' \
            > /tmp/genai-log-metric.json || true
          printf 'AUTHENTICATED_STATUS=%q\nUNAUTHENTICATED_STATUS=%q\nWRONG_SCOPE_STATUS=%q\n' \
            "$AUTHENTICATED_STATUS" "$UNAUTHENTICATED_STATUS" "$WRONG_SCOPE_STATUS" \
            > /tmp/shell-validation-status.env

      - name: Exercise controlled ChatOps ALARM and OK transitions
        id: legacy_chatops
        if: steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && inputs.run_chatops_test
        env:
          CHATOPS_ALARM_LOGICAL_PREFIX: ApiFunctionErrorsAlarm
        run: |
          set -euo pipefail

          mkdir -p evidence/chatops

          aws cloudformation list-stack-resources \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            > evidence/chatops/stack-resources.json

          python - <<'PYTHON'
          import json
          from pathlib import Path

          path = Path("evidence/chatops/stack-resources.json")
          resources = json.loads(path.read_text(encoding="utf-8")).get(
              "StackResourceSummaries",
              [],
          )

          resource_types = [
              resource.get("ResourceType", "")
              for resource in resources
          ]

          required = {
              "AWS::SNS::Topic",
              "AWS::Chatbot::SlackChannelConfiguration",
          }

          missing = required.difference(resource_types)

          if missing:
              raise SystemExit(
                  "Missing deployed ChatOps resources: "
                  + ", ".join(sorted(missing))
              )

          summary = {
              "sns_topics": resource_types.count("AWS::SNS::Topic"),
              "slack_configurations": resource_types.count(
                  "AWS::Chatbot::SlackChannelConfiguration"
              ),
              "cloudwatch_alarms": resource_types.count(
                  "AWS::CloudWatch::Alarm"
              ),
          }

          Path("evidence/chatops/resource-summary.json").write_text(
              json.dumps(summary, indent=2) + "\n",
              encoding="utf-8",
          )

          print(summary)
          PYTHON

          ALARM_NAME=$(
            aws cloudformation list-stack-resources \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query "StackResourceSummaries[?ResourceType=='AWS::CloudWatch::Alarm' && starts_with(LogicalResourceId, '$CHATOPS_ALARM_LOGICAL_PREFIX')].PhysicalResourceId | [0]" \
              --output text
          )

          test -n "$ALARM_NAME"
          test "$ALARM_NAME" != "None"

          export ALARM_NAME

          printf '%s\n' "$ALARM_NAME" \
            > evidence/chatops/alarm-name.txt

          aws cloudwatch describe-alarms \
            --alarm-names "$ALARM_NAME" \
            --region "$AWS_REGION" \
            > evidence/chatops/alarm-before.json

          aws cloudwatch set-alarm-state \
            --alarm-name "$ALARM_NAME" \
            --state-value ALARM \
            --state-reason "Controlled WA-014 ALARM test from GitHub run ${GITHUB_RUN_ID}" \
            --region "$AWS_REGION"

          date -u +"%Y-%m-%dT%H:%M:%SZ ALARM requested" \
            | tee evidence/chatops/alarm-transition.txt

          sleep 20

          aws cloudwatch set-alarm-state \
            --alarm-name "$ALARM_NAME" \
            --state-value OK \
            --state-reason "Controlled WA-014 OK recovery from GitHub run ${GITHUB_RUN_ID}" \
            --region "$AWS_REGION"

          date -u +"%Y-%m-%dT%H:%M:%SZ OK requested" \
            | tee -a evidence/chatops/alarm-transition.txt

          sleep 20

          aws cloudwatch describe-alarms \
            --alarm-names "$ALARM_NAME" \
            --region "$AWS_REGION" \
            > evidence/chatops/alarm-after.json

          aws cloudwatch describe-alarm-history \
            --alarm-name "$ALARM_NAME" \
            --history-item-type StateUpdate \
            --max-records 20 \
            --region "$AWS_REGION" \
            > evidence/chatops/alarm-history.json

          python - <<'PYTHON'
          import json
          import os
          from pathlib import Path

          history_path = Path("evidence/chatops/alarm-history.json")
          history = json.loads(
              history_path.read_text(encoding="utf-8")
          )

          states = []
          summaries = []

          for item in history.get("AlarmHistoryItems", []):
              summaries.append(item.get("HistorySummary", ""))

              raw_data = item.get("HistoryData", "")
              if not raw_data:
                  continue

              try:
                  data = json.loads(raw_data)
              except json.JSONDecodeError:
                  continue

              state = (
                  data.get("newState", {})
                  .get("stateValue")
              )

              if state:
                  states.append(state)

          required_states = {"ALARM", "OK"}
          missing = required_states.difference(states)

          if missing:
              raise SystemExit(
                  "Missing CloudWatch state transitions: "
                  + ", ".join(sorted(missing))
              )

          evidence = {
              "alarm_name": os.environ["ALARM_NAME"],
              "observed_states": states,
              "history_summaries": summaries,
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "slack_delivery_requires_visual_confirmation": True,
          }

          Path("evidence/chatops/transition-summary.json").write_text(
              json.dumps(evidence, indent=2) + "\n",
              encoding="utf-8",
          )

          print("CloudWatch ALARM and OK transitions verified")
          PYTHON

      - name: Load deployment outputs
        id: legacy_outputs
        if: steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && inputs.run_smoke_test
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          with open("evidence/cdk-outputs.json", encoding="utf-8") as handle:
              outputs = json.load(handle)["CloudOpsIncidentHubStack"]
          print(f"API_URL={outputs['ApiUrl'].rstrip('/')}")
          print(f"TABLE_NAME={outputs['TableName']}")
          print(f"EVENT_BUS_NAME={outputs['EventBusName']}")
          PY

      - name: Verify public health and protected API boundary
        id: legacy_boundary
        if: steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && inputs.run_smoke_test
        run: |
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            "$API_URL/health" | tee evidence/health.json

          anonymous_status=$(curl --silent --show-error \
            --output evidence/anonymous-events.json \
            --write-out '%{http_code}' \
            "$API_URL/events?limit=1")
          echo "$anonymous_status" > evidence/anonymous-events-status.txt
          test "$anonymous_status" = "401" || test "$anonymous_status" = "403" || {
            echo "Protected route unexpectedly returned HTTP $anonymous_status"
            exit 1
          }

      - name: Exercise EventBridge to DynamoDB processing
        id: legacy_smoke
        if: steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && inputs.run_smoke_test
        run: |
          EXPECTED_INCIDENT_ID=$(python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          run_id = os.environ["GITHUB_RUN_ID"]
          event_id = hashlib.sha256(
              f"{run_id}:{os.environ['GITHUB_SHA']}".encode()
          ).hexdigest()
          timestamp = datetime.now(timezone.utc).replace(microsecond=0)
          incident_id = f"INC-{timestamp:%Y%m%d}-{event_id[:8].upper()}"
          detail = {
              "event_id": event_id,
              "event": {
                  "source": f"github-actions-{run_id}",
                  "site": "ephemeral-lab",
                  "type": "GITHUB_OIDC_SMOKE_TEST",
                  "message": "Protected P0 deployment smoke test from GitHub Actions",
                  "metadata": {
                      "github_run_id": run_id,
                      "github_sha": os.environ["GITHUB_SHA"],
                  },
                  "timestamp": timestamp.isoformat(),
              },
          }
          entry = [{
              "EventBusName": os.environ["EVENT_BUS_NAME"],
              "Source": "cloudops.incident-hub",
              "DetailType": "InfrastructureIncidentReceived",
              "Detail": json.dumps(detail, separators=(",", ":")),
          }]
          with open("evidence/eventbridge-entry.json", "w", encoding="utf-8") as handle:
              json.dump(entry, handle, indent=2)
          print(incident_id)
          PY
          )
          export EXPECTED_INCIDENT_ID
          echo "EXPECTED_INCIDENT_ID=$EXPECTED_INCIDENT_ID" >> "$GITHUB_ENV"

          aws events put-events \
            --entries file://evidence/eventbridge-entry.json \
            | tee evidence/put-events-result.json

          python - <<'PY'
          import json
          with open("evidence/put-events-result.json", encoding="utf-8") as handle:
              result = json.load(handle)
          raise SystemExit(0 if result.get("FailedEntryCount") == 0 else 1)
          PY

          processed=false
          for attempt in $(seq 1 24); do
            aws dynamodb get-item \
              --table-name "$TABLE_NAME" \
              --key "{\"incident_id\":{\"S\":\"$EXPECTED_INCIDENT_ID\"}}" \
              --consistent-read > evidence/dynamodb-item.json
            if python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = Path("evidence/dynamodb-item.json").read_text(
              encoding="utf-8"
          ).strip()

          if not raw:
              raise SystemExit(1)

          item = json.loads(raw).get("Item", {})
          valid = (
              item.get("incident_id", {}).get("S") == os.environ["EXPECTED_INCIDENT_ID"]
              and item.get("type", {}).get("S") == "GITHUB_OIDC_SMOKE_TEST"
          )
          raise SystemExit(0 if valid else 1)
          PY
            then
              processed=true
              break
            fi
            sleep 5
          done

          test "$processed" = true || {
            echo "The asynchronous incident was not observable before the timeout"
            exit 1
          }

      - name: Collect asynchronous processor diagnostics
        id: legacy_diagnostics
        if: always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && steps.aws_credentials.outcome == 'success' && inputs.run_smoke_test
        continue-on-error: true
        run: |
          set +e

          mkdir -p evidence/diagnostics

          aws cloudformation list-stack-resources \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            > evidence/diagnostics/stack-resources.json 2> \
              evidence/diagnostics/stack-resources-error.txt

          python - <<'PY' > evidence/diagnostics/resources.env
          import json
          import shlex
          from pathlib import Path

          path = Path("evidence/diagnostics/stack-resources.json")

          if not path.exists() or not path.read_text(encoding="utf-8").strip():
              print("PROCESSOR_FUNCTION_NAME=''")
              print("PROCESSOR_LOG_GROUP_NAME=''")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))
          resources = data.get("StackResourceSummaries", [])

          def physical_id(logical_prefix: str, resource_type: str) -> str:
              for resource in resources:
                  logical_id = resource.get("LogicalResourceId", "")
                  if (
                      resource.get("ResourceType") == resource_type
                      and logical_id.startswith(logical_prefix)
                  ):
                      return resource.get("PhysicalResourceId", "")
              return ""

          function_name = physical_id(
              "ProcessorFunction",
              "AWS::Lambda::Function",
          )
          log_group_name = physical_id(
              "ProcessorFunctionLogGroup",
              "AWS::Logs::LogGroup",
          )

          print(
              "PROCESSOR_FUNCTION_NAME="
              + shlex.quote(function_name)
          )
          print(
              "PROCESSOR_LOG_GROUP_NAME="
              + shlex.quote(log_group_name)
          )
          PY

          source evidence/diagnostics/resources.env

          {
            echo "PROCESSOR_FUNCTION_NAME=$PROCESSOR_FUNCTION_NAME"
            echo "PROCESSOR_LOG_GROUP_NAME=$PROCESSOR_LOG_GROUP_NAME"
          } > evidence/diagnostics/resolved-resources.txt

          if [ -n "$PROCESSOR_FUNCTION_NAME" ]; then
            aws lambda get-function-configuration \
              --function-name "$PROCESSOR_FUNCTION_NAME" \
              --region "$AWS_REGION" \
              > evidence/diagnostics/processor-function.json 2> \
                evidence/diagnostics/processor-function-error.txt

            aws lambda list-event-source-mappings \
              --function-name "$PROCESSOR_FUNCTION_NAME" \
              --region "$AWS_REGION" \
              > evidence/diagnostics/event-source-mappings.json 2> \
                evidence/diagnostics/event-source-mappings-error.txt
          fi

          if [ -n "$PROCESSOR_LOG_GROUP_NAME" ]; then
            START_MS=$(( ($(date +%s) - 1800) * 1000 ))

            aws logs filter-log-events \
              --log-group-name "$PROCESSOR_LOG_GROUP_NAME" \
              --start-time "$START_MS" \
              --region "$AWS_REGION" \
              > evidence/diagnostics/processor-log-events.json 2> \
                evidence/diagnostics/processor-log-events-error.txt
          fi

          PROCESSING_QUEUE_URL=$(aws sqs get-queue-url \
            --queue-name cloudops-incident-processing \
            --region "$AWS_REGION" \
            --query QueueUrl \
            --output text 2> evidence/diagnostics/queue-url-error.txt)

          PROCESSING_DLQ_URL=$(aws sqs get-queue-url \
            --queue-name cloudops-incident-processing-dlq \
            --region "$AWS_REGION" \
            --query QueueUrl \
            --output text 2> evidence/diagnostics/dlq-url-error.txt)

          {
            echo "PROCESSING_QUEUE_URL=$PROCESSING_QUEUE_URL"
            echo "PROCESSING_DLQ_URL=$PROCESSING_DLQ_URL"
          } > evidence/diagnostics/queue-urls.txt

          if [ -n "$PROCESSING_QUEUE_URL" ] \
            && [ "$PROCESSING_QUEUE_URL" != "None" ]; then
            aws sqs get-queue-attributes \
              --queue-url "$PROCESSING_QUEUE_URL" \
              --attribute-names All \
              --region "$AWS_REGION" \
              > evidence/diagnostics/processing-queue-attributes.json 2> \
                evidence/diagnostics/processing-queue-error.txt
          fi

          if [ -n "$PROCESSING_DLQ_URL" ] \
            && [ "$PROCESSING_DLQ_URL" != "None" ]; then
            aws sqs get-queue-attributes \
              --queue-url "$PROCESSING_DLQ_URL" \
              --attribute-names All \
              --region "$AWS_REGION" \
              > evidence/diagnostics/dlq-attributes.json 2> \
                evidence/diagnostics/dlq-attributes-error.txt

            aws sqs receive-message \
              --queue-url "$PROCESSING_DLQ_URL" \
              --max-number-of-messages 10 \
              --visibility-timeout 0 \
              --wait-time-seconds 0 \
              --region "$AWS_REGION" \
              > evidence/diagnostics/dlq-messages.json 2> \
                evidence/diagnostics/dlq-messages-error.txt
          fi

      - name: Record deployment metadata
        id: legacy_metadata
        if: always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && steps.aws_credentials.outcome == 'success'
        run: |
          mkdir -p evidence
          {
            echo "repository=${GITHUB_REPOSITORY}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "commit=${GITHUB_SHA}"
            echo "region=${AWS_REGION}"
            echo "stack=${STACK_NAME}"
            date -u +"captured_at=%Y-%m-%dT%H:%M:%SZ"
          } > evidence/deployment-metadata.txt

      - name: Upload temporary deployment evidence
        id: legacy_upload
        if: always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'legacy' && (inputs.run_smoke_test || inputs.run_chatops_test)
        uses: actions/upload-artifact@v4
        with:
          name: aws-ephemeral-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: warn
          retention-days: 7

      - name: Destroy ephemeral stack
        id: destroy
        if: always() && steps.preflight.outcome == 'success' && steps.aws_credentials.outcome == 'success'
        working-directory: infrastructure
        run: |
          destroy_context=(
            -c account="$AWS_ACCOUNT_ID"
            -c region="$AWS_REGION"
          )
          if [ "${{ steps.preflight.outputs.profile }}" = "genai-shell" ]; then
            destroy_context+=(-c enable_load_test_client=true)
          fi
          cdk destroy "$STACK_NAME" --force "${destroy_context[@]}"

      - name: Verify stack removal
        id: cleanup
        if: always() && steps.preflight.outcome == 'success' && steps.aws_credentials.outcome == 'success' && steps.destroy.outcome == 'success'
        run: |
          set -euo pipefail
          cleanup_verification_files() {
            rm -f /tmp/genai-cleanup-*.json /tmp/genai-cleanup-*.txt
          }
          trap cleanup_verification_files EXIT

          set +e
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            > /tmp/genai-cleanup-stack.json \
            2> /tmp/genai-cleanup-stack-error.txt
          stack_status=$?
          set -e
          if [ "$stack_status" -eq 0 ]; then
            echo "Cleanup failed: stack still exists"
            exit 1
          fi
          if ! grep -q "does not exist" /tmp/genai-cleanup-stack-error.txt; then
            echo "Cleanup failed: stack absence could not be verified"
            exit 1
          fi

          if [ "${{ steps.preflight.outputs.profile }}" = "legacy" ]; then
            echo "Legacy stack cleanup verified"
            exit 0
          fi

          set +e
          aws lambda get-function \
            --function-name cloudops-genai-summary-function \
            --region "$AWS_REGION" \
            > /tmp/genai-cleanup-function.json \
            2> /tmp/genai-cleanup-function-error.txt
          function_status=$?
          set -e
          if [ "$function_status" -eq 0 ]; then
            echo "Cleanup failed: GenAI Lambda still exists"
            exit 1
          fi
          if ! grep -q "ResourceNotFoundException" \
            /tmp/genai-cleanup-function-error.txt; then
            echo "Cleanup failed: GenAI Lambda absence could not be verified"
            exit 1
          fi

          if ! aws logs describe-log-groups \
            --log-group-name-prefix /aws/lambda/cloudops-genai-summary-function \
            --region "$AWS_REGION" \
            --query "logGroups[?logGroupName=='/aws/lambda/cloudops-genai-summary-function'].logGroupName" \
            --output json \
            > /tmp/genai-cleanup-log-groups.json \
            2> /tmp/genai-cleanup-log-groups-error.txt; then
            echo "Cleanup failed: GenAI Log Group absence could not be verified"
            exit 1
          fi
          if ! python - <<'PY'
          import json
          from pathlib import Path

          names = json.loads(
              Path("/tmp/genai-cleanup-log-groups.json").read_text(encoding="utf-8")
          )
          raise SystemExit(0 if names == [] else 1)
          PY
          then
            echo "Cleanup failed: GenAI Log Group still exists"
            exit 1
          fi
          echo "Cleanup verified"

      - name: Generate sanitized GenAI shell evidence
        id: evidence
        if: always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'genai-shell' && steps.synth.outcome == 'success' && steps.deploy.outcome == 'success' && steps.iam.outcome == 'success' && steps.genai_smoke.outcome == 'success' && steps.destroy.outcome == 'success' && steps.cleanup.outcome == 'success'
        run: |
          source /tmp/shell-validation-status.env
          python scripts/validate_genai_shell_aws.py evidence \
            --output evidence/genai-shell-validation.json \
            --commit-sha "$GITHUB_SHA" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --region "$AWS_REGION" \
            --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --unauthenticated-status "$UNAUTHENTICATED_STATUS"

      - name: Upload sanitized GenAI shell evidence
        id: genai_upload
        if: always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'genai-shell' && steps.evidence.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: genai-shell-aws-validation-${{ github.run_id }}
          path: evidence/genai-shell-validation.json
          if-no-files-found: error
          retention-days: 7

      - name: Remove GenAI validation temporary files
        id: temp_cleanup
        if: always() && steps.preflight.outcome == 'success' && steps.preflight.outputs.profile == 'genai-shell'
        run: |
          rm -f /tmp/genai-oauth-curl.conf /tmp/client-secret.txt
          rm -f /tmp/cloudops-full-token.json /tmp/cloudops-partial-token.json
          rm -f /tmp/genai-cdk-outputs.json /tmp/genai-outputs.env
          rm -f /tmp/genai-event.json /tmp/genai-create-response.json
          rm -f /tmp/genai-incidents.json /tmp/genai-summary-request.json
          rm -f /tmp/genai-authenticated-headers.txt
          rm -f /tmp/genai-authenticated-body.json
          rm -f /tmp/genai-unauthenticated-body.txt
          rm -f /tmp/genai-wrong-scope-body.txt
          rm -f /tmp/genai-deployed-template-response.json
          rm -f /tmp/genai-deployed-template.json
          rm -f /tmp/genai-cleanup-stack.json
          rm -f /tmp/genai-cleanup-stack-error.txt
          rm -f /tmp/genai-cleanup-function.json
          rm -f /tmp/genai-cleanup-function-error.txt
          rm -f /tmp/genai-cleanup-log-groups.json
          rm -f /tmp/genai-cleanup-log-groups-error.txt
          rm -f /tmp/genai-log-metric.json /tmp/shell-validation-status.env
          rm -f evidence/genai-shell-validation.json
          rmdir evidence 2>/dev/null || true
          rm -rf infrastructure/cdk.out

      - name: Enforce GenAI validation and cleanup outcomes
        if: always()
        run: |
          test "${{ steps.preflight.outcome }}" = "success"
          case "${{ steps.preflight.outputs.profile }}" in
            genai-shell)
              for outcome in \
                "${{ steps.synth.outcome }}" \
                "${{ steps.deploy.outcome }}" \
                "${{ steps.iam.outcome }}" \
                "${{ steps.genai_smoke.outcome }}" \
                "${{ steps.destroy.outcome }}" \
                "${{ steps.cleanup.outcome }}" \
                "${{ steps.evidence.outcome }}" \
                "${{ steps.genai_upload.outcome }}" \
                "${{ steps.temp_cleanup.outcome }}"; do
                test "$outcome" = "success"
              done
              ;;
            legacy)
              for outcome in \
                "${{ steps.synth.outcome }}" \
                "${{ steps.deploy.outcome }}" \
                "${{ steps.legacy_metadata.outcome }}" \
                "${{ steps.legacy_upload.outcome }}" \
                "${{ steps.destroy.outcome }}" \
                "${{ steps.cleanup.outcome }}"; do
                test "$outcome" = "success"
              done
              if [ "${{ inputs.run_smoke_test }}" = "true" ]; then
                test "${{ steps.legacy_outputs.outcome }}" = "success"
                test "${{ steps.legacy_boundary.outcome }}" = "success"
                test "${{ steps.legacy_smoke.outcome }}" = "success"
                test "${{ steps.legacy_diagnostics.outcome }}" = "success"
              fi
              if [ "${{ inputs.run_chatops_test }}" = "true" ]; then
                test "${{ steps.legacy_chatops.outcome }}" = "success"
              fi
              ;;
            *)
              exit 1
              ;;
          esac
